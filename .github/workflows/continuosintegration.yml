name: Continuos Integration
on: [push]

jobs:
  phpunit:
    name: PHPUnit (Laravel + Filament)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Executar Testes Laravel
        uses: nathanheffley/laravel-phpunit-action@master
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: ":memory:"
